esphome:
  name: wallbox-esp32-modbus
  friendly_name: "Wallbox ESP32 Modbus"

esp32:
  board: esp32dev
  framework:
    type: arduino

# WLAN-Konfiguration (Hier Platzhalter für GitHub nutzen)
wifi:
  ssid: "DEIN_WLAN_NAME"
  password: "DEIN_WLAN_PASSWORT"

api:
ota:
  - platform: esphome

logger:

# Serielle Schnittstelle für den RS485-Adapter
uart:
  id: mod_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 19200
  stop_bits: 1

modbus:
  id: modbus_hub

modbus_controller:
  - id: WallboxESP_server
    address: 1
    modbus_id: modbus_hub

# Globale Variable für den virtuellen Modbus-Schalter
globals:
  - id: ladefreigabe_status
    type: bool
    restore_value: yes
    initial_value: 'false'

# Schreibbare Register
number:
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    name: "Ladestrom setzen"
    id: strom_limit
    address: 261
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    min_value: 6.0
    max_value: 16.0
    step: 0.1
    lambda: "return x / 10.0;"
    write_lambda: |-
      return (int)(x * 10.0);

# Zusammengeführte Schalter
switch:
  - platform: gpio
    pin: GPIO21
    name: "Wallbox AN-PF-Kontakt_ESP32"
    id: PF_Kontakt_ESP32

  - platform: template
    name: "Ladefreigabe"
    id: ladefreigabe
    icon: "mdi:ev-station"
    lambda: |-
      return id(ladefreigabe_status);
    turn_on_action:
      - lambda: |-
          id(ladefreigabe_status) = true;
          std::vector<uint8_t> cmd = {0x01, 0x06, 0x01, 0x03, 0x00, 0x01};
          auto command = esphome::modbus_controller::ModbusCommandItem::create_custom_command(WallboxESP_server, cmd);
          WallboxESP_server->queue_command(command);
    turn_off_action:
      - lambda: |-
          id(ladefreigabe_status) = false;
          std::vector<uint8_t> cmd = {0x01, 0x06, 0x01, 0x03, 0x00, 0x00};
          auto command = esphome::modbus_controller::ModbusCommandItem::create_custom_command(WallboxESP_server, cmd);
          WallboxESP_server->queue_command(command);

# Intervall füttert alle 30s den Modbus-Watchdog, um weiß-blaues Blinken im Standby zu verhindern
interval:
  - interval: 30s
    then:
      - lambda: |-
          if (id(strom_limit).has_state()) {
            auto call = id(strom_limit).make_call();
            call.set_value(id(strom_limit).state);
            call.perform();
          }
