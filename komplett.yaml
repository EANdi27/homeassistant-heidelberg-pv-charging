 #✍️ Schreibbare Register
number:
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    name: "Ladestrom setzen"
    id: strom_limit
    address: 261
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
   # INTERNE GRENZEN: Passend zu deinen HA-Werten (6.0 bis 16.0)
    min_value: 6.0
    max_value: 16.0
    step: 0.1
    # Wandelt den gelesenen Box-Wert (z.B. 160) für Home Assistant in 16.0 um
    lambda: "return x / 10.0;"
    # Wandelt den von HA gesendeten Wert (z.B. 11.5) für den Modbus in 115 um
    write_lambda: |-
      return (int)(x * 10.0);
  
# Das Intervall steht ganz links am Rand (Top-Level)
interval:
  - interval: 30s
    then:
      - lambda: |-
          // Füttert den Watchdog materialschonend:
          // Es simuliert eine manuelle Änderung im UI, nutzt aber die interne Warteschlange,
          // anstatt den Modbus-Bus mit Gewalt zu blockieren.
          if (id(strom_limit).has_state()) {
            auto call = id(strom_limit).make_call();
            call.set_value(id(strom_limit).state);
            call.perform();
          }
