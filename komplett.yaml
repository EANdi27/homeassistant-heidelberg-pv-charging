globals:
  - id: ladefreigabe_status
    type: bool
    restore_value: yes
    initial_value: 'false'


esphome:
  name: wallbox-esp32-modbus
  friendly_name: Wallbox_ESP32_Modbus

esp32:
  board: esp32dev
  framework:
    type: arduino
         

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: ".xxx..."

ota:
  - platform: esphome
    password: "xxxxx"

wifi:
  ssid: !secret wifi_ssid # dein passwort aus den HA- Einstellungen
  password: !secret wifi_password # dein passwort

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Wallbox-Esp32-Modbus"
    password: "xxx aus der Installation mit ESP home"

captive_portal:

switch:
  - platform: gpio
    pin: GPIO21
    name: "Wallbox AN-PF-Kontakt_ESP32"
    id: PF_Kontakt_ESP32

  - platform: template
    name: "Ladefreigabe"
    id: ladefreigabe
    icon: "mdi:ev-station"
    lambda: |-
      return id(ladefreigabe_status);
    turn_on_action:
      - lambda: |-
          id(ladefreigabe_status) = true;
          std::vector<uint8_t> cmd = {0x01, 0x06, 0x01, 0x03, 0x00, 0x01};
          auto command = esphome::modbus_controller::ModbusCommandItem::create_custom_command(WallboxESP_server, cmd);
          WallboxESP_server->queue_command(command);
    turn_off_action:
      - lambda: |-
          id(ladefreigabe_status) = false;
          std::vector<uint8_t> cmd = {0x01, 0x06, 0x01, 0x03, 0x00, 0x00};
          auto command = esphome::modbus_controller::ModbusCommandItem::create_custom_command(WallboxESP_server, cmd);
          WallboxESP_server->queue_command(command);
  
uart:
  id: mod_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 19200
  stop_bits: 1
  parity: EVEN

modbus:
  id: modbus_rtu_bus
  uart_id: mod_bus
  flow_control_pin: GPIO4 #steuert DE/RE des RS485 Adapters
   

modbus_controller:
  - id: WallboxESP_server
    modbus_id: modbus_rtu_bus
    address: 1
    update_interval: 5s
    command_throttle: 1000ms



 #Modbus Register Layouts Version auslesen
sensor:
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: Version
    address: 4
    register_type: read
    value_type: U_WORD
    name: "Modbus_Register_Layouts_Version"
   
# Auslesen Ladestatus
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: Ladestatus
    address: 5
    register_type: read
    value_type: U_WORD
    name: "Ladestatus"

 # Auslesen der Stromstärken   
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: current_L1
    address: 6
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    name: "Strom_L1"
    filters: 
      - multiply: 0.1
    accuracy_decimals: 1
        
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: current_L2
    address: 7
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    name: "Strom_L2"
    filters: 
      - multiply: 0.1
    accuracy_decimals: 1
        
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: current_L3
    address: 8
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A" 
    name: "Strom_L3"
    filters: 
      - multiply: 0.1  
    accuracy_decimals: 1

 #Auslesen der PCB Temperatur
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: PCB_Temperatur
    address: 9
    register_type: read
    value_type: S_WORD
    unit_of_measurement: "°C"
    filters: 
      - multiply: 0.1
    name: "PCB_Temperatur"

# Auslesen der el. Spannungen
  
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: Voltage_L1
    address: 10
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "V"
    name: "Spannung_L1"

  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: Voltage_L2
    address: 11
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "V"
    name: "Spannung_L2"

  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: Voltage_L3
    address: 12
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "V"
    name: "Spannung_L3" 

# auslesen des Zustandes PF- Kontakt
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    id: Freigabe
    address: 13
    register_type: read 
    value_type: U_WORD
