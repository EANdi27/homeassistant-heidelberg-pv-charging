esphome:
  name: wallbox-esp32-modbus-test
  friendly_name: "Wallbox ESP32 Testbetrieb"
  
  # START-BEFEHL: Sobald der ESP32 hochfährt, setzt er das Register 261 
  # automatisch auf 60 (entspricht 6.0 A) und aktiviert das PF-Relais.
  on_boot:
    priority: -10
    then:
      - number.set:
          id: strom_limit
          value: 6.0
      - switch.turn_on: id_pf_kontakt

esp32:
  board: esp32dev
  framework:
    type: arduino

# --- WLAN-DATEN (Vor dem Flashen anpassen) ---
wifi:
  ssid: "DEIN_WLAN_NAME"
  password: "DEIN_WLAN_PASSWORT"

api: # Ermöglicht die Verbindung zu Home Assistant
ota: # Drahtlose Updates über WLAN
  - platform: esphome

logger: # Log-Ausgabe über USB und WLAN

# 1. Serieller Bus (Verbindung zum RS485-Adapter)
uart:
  id: mod_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 19200
  stop_bits: 1

modbus:
  id: modbus_hub

modbus_controller:
  - id: WallboxESP_server
    address: 1
    modbus_id: modbus_hub

# 2. Hardware-Relais für den potentialfreien Kontakt (Hauptschalter)
switch:
  - platform: gpio
    pin: GPIO21
    name: "Wallbox AN-PF-Kontakt_ESP32"
    id: id_pf_kontakt

# 3. Schreibbares Register 261 (Ladestrom)
number:
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    name: "Ladestrom setzen"
    id: strom_limit
    address: 261
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "A"
    min_value: 6.0
    max_value: 16.0
    step: 0.1
    # Liest z.B. 60 aus der Box und zeigt 6.0 A im UI
    lambda: "return x / 10.0;"
    # Wandelt die 6.0 vor dem Schreiben wieder in die Ganzzahl 60 um
    write_lambda: |-
      return (int)(x * 10.0);

# 4. Reine Lese-Register (Sensoren zur Überprüfung der Verbindung)
sensor:
  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    name: "Ladestatus"
    address: 5
    register_type: holding
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    name: "Spannung L1"
    address: 100
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "V"

  - platform: modbus_controller
    modbus_controller_id: WallboxESP_server
    name: "Strom L1"
    address: 6
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    filters:
      - multiply: 0.1
